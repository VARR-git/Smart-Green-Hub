[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Quad Flash 16MB + Quad PSRAM 8MB (hasil esptool flash_id: AP_3v3)
board_build.arduino.memory_type = dio_qspi
board_build.flash_mode = dio
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv

build_flags =
    -D BOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0

; --- Library Dependencies ---
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    mobizt/Firebase Arduino Client Library for ESP8266 and ESP32 @ ^4.4.17

; Upload wireless satu jaringan: pilih env ini lalu tekan Upload
[env:wireless]
extends = env:esp32-s3-devkitc-1
upload_protocol = espota
upload_port = smart-green-hub.local