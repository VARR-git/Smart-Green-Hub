<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varr Hydroponics IoT</title>
    <!-- Tailwind CSS untuk UI yang keren -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-slate-800 p-4 shadow-md border-b border-slate-700 text-center">
        <h1 class="text-2xl font-bold text-emerald-400">Smart Green Hub</h1>
        <p class="text-xs text-slate-400 mt-1">ESP32-S3 Controlled System</p>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto p-4 w-full grid grid-rows-1 md:grid-rows-2 gap-6">
        
        <!-- Sensor Cards -->
        <div class="grid grid-cols-2 gap-4">
            <!-- pH Card -->
            <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 text-center flex flex-col justify-center items-center">
                <h3 class="text-slate-400 font-medium text-sm uppercase">Kadar pH</h3>
                <p id="ph-val" class="text-4xl font-extrabold text-cyan-400 mt-2">--</p>
                <span class="text-xs text-slate-500 block mt-2">Target: 5.5 - 6.5</span>
            </div>
            
            <!-- TDS Card -->
            <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 text-center flex flex-col justify-center items-center">
                <h3 class="text-slate-400 font-medium text-sm uppercase">Nutrisi (TDS)</h3>
                <p id="tds-val" class="text-4xl font-extrabold text-amber-400 mt-2">--</p>
                <span class="text-xs text-slate-500 block mt-2">PPM</span>
            </div>
        </div>

        <!-- Control Card -->
        <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 flex flex-col justify-between items-center text-center">
            <div>
                <h3 class="text-slate-400 font-medium text-sm uppercase">Kontrol Pompa Utama</h3>
                <p class="text-xs text-slate-500 mt-1">Water Plus SS-F-2500</p>
            </div>
            
            <!-- Pump Status Indicator -->
            <div class="my-6">
                <div id="pump-status" class="px-6 py-2 bg-slate-700 text-slate-400 text-sm font-bold uppercase rounded-full shadow-inner tracking-wider">
                    DISCONNECTED
                </div>
            </div>

            <!-- Button Toggle -->
            <button id="btn-toggle" onclick="togglePump()" class="w-full bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-slate-950 font-bold py-3 px-6 rounded-xl shadow-lg shadow-emerald-500/20 transition-all duration-150">
                TOGGLE POMPA
            </button>
        </div>

    </main>

    <!-- Footer / Status Koneksi -->
    <footer class="bg-slate-950 px-4 py-2 text-center text-xs text-slate-500 flex justify-between items-center">
        <span>IP: 192.168.110.212</span>
        <div class="flex items-center gap-2">
            <span id="ws-badge" class="w-2 h-2 rounded-full bg-red-500"></span>
            <span id="ws-status">Node ESP32 &middot; Offline</span>
        </div>
    </footer>

    <!-- Logika WebSocket (Real-time Communication) -->
    <script>
        // Sesuaikan target alamat websocket ke ESP32 kamu
        const gateway = `ws://${window.location.hostname}/ws`;
        let websocket;

        function initWebSocket() {
            console.log('Membuka koneksi WebSocket...');
            websocket = new WebSocket(gateway);
            
            websocket.onopen = () => {
                document.getElementById('ws-status').innerText = 'Connected';
                document.getElementById('ws-badge').className = 'w-2 h-2 rounded-full bg-emerald-500';
            };
            
            websocket.onclose = () => {
                document.getElementById('ws-status').innerText = 'Disconnected';
                document.getElementById('ws-badge').className = 'w-2 h-2 rounded-full bg-red-500';
                setTimeout(initWebSocket, 2000); // Reconnect otomatis jika putus
            };
            
            websocket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // Update nilai sensor ke UI secara real-time
                document.getElementById('ph-val').innerText = data.ph.toFixed(2);
                document.getElementById('tds-val').innerText = data.tds;
                
                // Update status visual tombol pompa
                const statusBadge = document.getElementById('pump-status');
                if (data.pump === "ON") {
                    statusBadge.innerText = "POMPA: NYALA";
                    statusBadge.className = "px-6 py-2 bg-emerald-500/20 text-emerald-400 text-sm font-bold uppercase rounded-full tracking-wider border border-emerald-500/30";
                } else {
                    statusBadge.innerText = "POMPA: MATI";
                    statusBadge.className = "px-6 py-2 bg-rose-500/20 text-rose-400 text-sm font-bold uppercase rounded-full tracking-wider border border-rose-500/30";
                }
            };
        }

        function togglePump() {
            // Mengirim perintah ke ESP32 melalui jalur WebSocket
            websocket.send('TOGGLE_PUMP');
        }

        // Jalankan koneksi saat halaman dibuka
        window.addEventListener('load', initWebSocket);
    </script>
</body>
</html>
